<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TileTok — Open your puzzle 🩷</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
</head>
<body class="play-body">
  <div class="noise"></div>

  <nav>
    <a href="index.html" class="logo">TileTok 🫧</a>
  </nav>

  <!-- Loading -->
  <div class="play-state" id="loadingState">
    <div class="loading-spinner"></div>
    <p>loading your puzzle...</p>
  </div>

  <!-- Error -->
  <div class="play-state hidden" id="errorState">
    <div class="error-emoji">😿</div>
    <h2>Puzzle not found</h2>
    <p>This link might be broken or expired.</p>
    <a href="index.html" class="btn-primary">Go home</a>
  </div>

  <!-- Game -->
  <div class="play-container hidden" id="gameState">
    <div class="puzzle-header">
      <div class="puzzle-from">someone made this for you 🫧</div>
      <h1 id="puzzleTitle">loading...</h1>
      <p class="puzzle-hint">tap the tiles in the right order to unlock</p>
    </div>

    <div class="game-area">
      <div class="puzzle-grid" id="playGrid"></div>

      <div class="game-status">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="gameMessage">tap a tile to start 🩷</div>
      </div>

      <button class="btn-ghost sm" id="resetGame">↺ start over</button>
    </div>

    <!-- Wrong shake overlay -->
    <div class="wrong-flash hidden" id="wrongFlash">
      <span>wrong tile! 😬</span>
    </div>
  </div>

  <!-- Reward Modal -->
  <div class="reward-overlay hidden" id="rewardOverlay">
    <div class="reward-modal">
      <div class="reward-confetti" id="confetti"></div>
      <div class="reward-badge">🎉</div>
      <h2>you did it!</h2>
      <p class="reward-sub">here's your message</p>
      <div class="reward-content" id="rewardContent"></div>
      <button class="btn-primary" id="closeReward">aww 🩷</button>
      <a href="create.html" class="btn-ghost sm">make one for them too →</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCpxKkfJmNj2EudEqZbNlLx0UdPDhDRYAY",
      authDomain: "puzzle-love-note.firebaseapp.com",
      projectId: "puzzle-love-note",
      storageBucket: "puzzle-love-note.firebasestorage.app",
      messagingSenderId: "163699031865",
      appId: "1:163699031865:web:6fa91a7e30f3a58aa072e8",
      measurementId: "G-7YF4BYC2BX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const puzzleId = params.get('id');

    let puzzle = null;
    let clickSequence = [];
    let tiles = [];

    async function loadPuzzle() {
      if (!puzzleId) { showError(); return; }
      try {
        const snap = await getDoc(doc(db, 'puzzles', puzzleId));
        if (!snap.exists()) { showError(); return; }
        puzzle = snap.data();
        await updateDoc(doc(db, 'puzzles', puzzleId), { plays: increment(1) });
        initGame();
      } catch (e) {
        console.error(e);
        showError();
      }
    }

    function showError() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
    }

    function initGame() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('gameState').classList.remove('hidden');
      document.getElementById('puzzleTitle').textContent = puzzle.title;
      document.title = `${puzzle.title} — TileTok`;

      buildPlayGrid();
    }

    function buildPlayGrid() {
      const grid = document.getElementById('playGrid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${puzzle.gridSize}, 1fr)`;
      clickSequence = [];
      tiles = [];
      updateProgress(0);
      document.getElementById('gameMessage').textContent = 'tap a tile to start 🩷';

      for (let i = 0; i < puzzle.gridSize * puzzle.gridSize; i++) {
        const tile = document.createElement('button');
        tile.className = `ptile color-${puzzle.tileColor}`;
        tile.dataset.idx = i;
        tile.addEventListener('click', () => handlePlay(i, tile));
        grid.appendChild(tile);
        tiles.push(tile);
      }
    }

    function handlePlay(idx, tile) {
      if (tile.classList.contains('done') || tile.classList.contains('wrong-tile')) return;

      const expected = puzzle.pattern[clickSequence.length];

      if (idx === expected) {
        // Correct!
        clickSequence.push(idx);
        tile.classList.add('done');
        tile.textContent = clickSequence.length;

        const pct = (clickSequence.length / puzzle.pattern.length) * 100;
        updateProgress(pct);

        if (clickSequence.length === 1) {
          document.getElementById('gameMessage').textContent = `${clickSequence.length}/${puzzle.pattern.length} — keep going! 🔥`;
        } else if (clickSequence.length === puzzle.pattern.length) {
          document.getElementById('gameMessage').textContent = 'all done! opening... 🫧';
          setTimeout(showReward, 600);
        } else {
          document.getElementById('gameMessage').textContent = `${clickSequence.length}/${puzzle.pattern.length} — you're doing great 💫`;
        }
      } else {
        // Wrong!
        tile.classList.add('wrong-tile');
        showWrongFlash();
        document.getElementById('gameMessage').textContent = 'wrong tile! try again 😬';
        setTimeout(() => {
          tile.classList.remove('wrong-tile');
        }, 700);
        // Reset sequence
        clickSequence = [];
        tiles.forEach(t => {
          if (!t.classList.contains('done')) return;
          t.classList.remove('done');
          t.textContent = '';
        });
        updateProgress(0);
        setTimeout(() => {
          document.getElementById('gameMessage').textContent = 'start from tile 1 again 🥺';
        }, 800);
      }
    }

    function showWrongFlash() {
      const el = document.getElementById('wrongFlash');
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 800);
    }

    function updateProgress(pct) {
      document.getElementById('progressFill').style.width = pct + '%';
    }

    function showReward() {
      const overlay = document.getElementById('rewardOverlay');
      const content = document.getElementById('rewardContent');
      overlay.classList.remove('hidden');

      if (puzzle.rewardType === 'text') {
        content.innerHTML = `<div class="reward-text">${escapeHtml(puzzle.rewardContent)}</div>`;
      } else if (puzzle.rewardType === 'image') {
        content.innerHTML = `<img src="${escapeHtml(puzzle.rewardContent)}" alt="reward" class="reward-img" onerror="this.src=''; this.parentElement.innerHTML='<p>image failed to load 😢<br><a href=\\'${escapeHtml(puzzle.rewardContent)}\\' target=\\'_blank\\'>open link →</a></p>'" />`;
      } else if (puzzle.rewardType === 'video') {
        const url = puzzle.rewardContent;
        let embed = url;
        if (url.includes('youtube.com/watch')) {
          const id = new URL(url).searchParams.get('v');
          embed = `https://www.youtube.com/embed/${id}?autoplay=1`;
        } else if (url.includes('youtu.be/')) {
          const id = url.split('youtu.be/')[1].split('?')[0];
          embed = `https://www.youtube.com/embed/${id}?autoplay=1`;
        }
        content.innerHTML = `<div class="video-wrap"><iframe src="${embed}" frameborder="0" allowfullscreen allow="autoplay"></iframe></div>`;
      }

      spawnConfetti();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function spawnConfetti() {
      const container = document.getElementById('confetti');
      container.innerHTML = '';
      const colors = ['#ff6b9d','#a855f7','#3b82f6','#fcd34d','#6ee7b7','#fff'];
      for (let i = 0; i < 60; i++) {
        const dot = document.createElement('div');
        dot.className = 'confetti-dot';
        dot.style.cssText = `
          left:${Math.random()*100}%;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-delay:${Math.random()*1.5}s;
          animation-duration:${1.5+Math.random()}s;
          width:${6+Math.random()*8}px;
          height:${6+Math.random()*8}px;
          border-radius:${Math.random()>0.5?'50%':'2px'};
        `;
        container.appendChild(dot);
      }
    }

    document.getElementById('resetGame').addEventListener('click', buildPlayGrid);
    document.getElementById('closeReward').addEventListener('click', () => {
      document.getElementById('rewardOverlay').classList.add('hidden');
    });

    loadPuzzle();
  </script>
</body>
</html>
